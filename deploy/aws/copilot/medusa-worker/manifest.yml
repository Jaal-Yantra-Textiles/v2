# The Medusa background process — subscribers, scheduled jobs, workflow engine.
# Singleton (1 task fixed), no public route, on Fargate Spot for ~70% cost savings.
# Same image as medusa-server; MEDUSA_WORKER_MODE=worker selects the role.

name: medusa-worker
type: Backend Service

image:
  location: 369351873445.dkr.ecr.us-east-1.amazonaws.com/jyt-medusa:latest
  # No `port:` — this service doesn't accept inbound HTTP.

cpu: 512        # 0.5 vCPU
memory: 1024    # 1 GB

# Fixed singleton on Fargate Spot.
# Running 2+ would double-execute scheduled jobs and subscribers.
count:
  spot: 1

network:
  vpc:
    placement: public

variables:
  NODE_ENV: production
  MEDUSA_WORKER_MODE: worker
  DISABLE_MEDUSA_ADMIN: "true"

# Worker needs DB + Redis + R2 (for export/report jobs that write files).
# Does NOT need JWT/COOKIE/CORS (no HTTP surface).
secrets:
  CLOUDFLARE_API_TOKEN: /jyt/prod/CLOUDFLARE_API_TOKEN
  CLOUDFLARE_ZONE_ID: /jyt/prod/CLOUDFLARE_ZONE_ID
  DATABASE_URL: /jyt/prod/DATABASE_URL
  DELHIVERY_API_TOKEN: /jyt/prod/DELHIVERY_API_TOKEN
  ENCRYPTION_KEY: /jyt/prod/ENCRYPTION_KEY
  ENCRYPTION_KEY_VERSION: /jyt/prod/ENCRYPTION_KEY_VERSION
  FACEBOOK_CLIENT_ID: /jyt/prod/FACEBOOK_CLIENT_ID
  FACEBOOK_CLIENT_SECRET: /jyt/prod/FACEBOOK_CLIENT_SECRET
  FACEBOOK_WEBHOOK_VERIFY_TOKEN: /jyt/prod/FACEBOOK_WEBHOOK_VERIFY_TOKEN
  FAL_KEY: /jyt/prod/FAL_KEY
  MAILEROO_API_KEY: /jyt/prod/MAILEROO_API_KEY
  MAILEROO_FROM_DOMAIN: /jyt/prod/MAILEROO_FROM_DOMAIN
  MAILEROO_FROM_EMAIL: /jyt/prod/MAILEROO_FROM_EMAIL
  MAILEROO_FROM_NAME: /jyt/prod/MAILEROO_FROM_NAME
  MAILJET_API_KEY: /jyt/prod/MAILJET_API_KEY
  MAILJET_FROM_EMAIL: /jyt/prod/MAILJET_FROM_EMAIL
  MAILJET_FROM_NAME: /jyt/prod/MAILJET_FROM_NAME
  MAILJET_SECRET_KEY: /jyt/prod/MAILJET_SECRET_KEY
  MASTRA_ENABLE_EMBEDDINGS: /jyt/prod/MASTRA_ENABLE_EMBEDDINGS
  MEDUSA_BACKEND_URL: /jyt/prod/MEDUSA_BACKEND_URL
  MEDUSA_FF_CACHING: /jyt/prod/MEDUSA_FF_CACHING
  MEDUSA_FF_INDEX_ENGINE: /jyt/prod/MEDUSA_FF_INDEX_ENGINE
  MEDUSA_FF_VIEW_CONFIGURATIONS: /jyt/prod/MEDUSA_FF_VIEW_CONFIGURATIONS
  MISTRAL_API_KEY: /jyt/prod/MISTRAL_API_KEY
  OPENAI_API_KEY: /jyt/prod/OPENAI_API_KEY
  OPENROUTER_API_KEY: /jyt/prod/OPENROUTER_API_KEY
  PAYU_MERCHANT_KEY: /jyt/prod/PAYU_MERCHANT_KEY
  PAYU_MERCHANT_SALT: /jyt/prod/PAYU_MERCHANT_SALT
  PAYU_MODE: /jyt/prod/PAYU_MODE
  REDIS_URL: /jyt/prod/REDIS_URL
  RESEND_API_KEY: /jyt/prod/RESEND_API_KEY
  RESEND_FROM_EMAIL: /jyt/prod/RESEND_FROM_EMAIL
  S3_ACCESS_KEY_ID: /jyt/prod/S3_ACCESS_KEY_ID
  S3_BUCKET: /jyt/prod/S3_BUCKET
  S3_ENDPOINT: /jyt/prod/S3_ENDPOINT
  S3_FILE_URL: /jyt/prod/S3_FILE_URL
  S3_PREFIX: /jyt/prod/S3_PREFIX
  S3_REGION: /jyt/prod/S3_REGION
  S3_SECRET_ACCESS_KEY: /jyt/prod/S3_SECRET_ACCESS_KEY
  SENTRY_DSN: /jyt/prod/SENTRY_DSN
  STRIPE_API_KEY: /jyt/prod/STRIPE_API_KEY
  STRIPE_WEBHOOK_SECRET: /jyt/prod/STRIPE_WEBHOOK_SECRET
  VERCEL_STOREFRONT_REPO: /jyt/prod/VERCEL_STOREFRONT_REPO
  VERCEL_TEAM_ID: /jyt/prod/VERCEL_TEAM_ID
  VERCEL_TOKEN: /jyt/prod/VERCEL_TOKEN
  VISUAL_FLOW_FAILURE_EMAIL: /jyt/prod/VISUAL_FLOW_FAILURE_EMAIL
  WHATSAPP_ACCESS_TOKEN: /jyt/prod/WHATSAPP_ACCESS_TOKEN
  WHATSAPP_INITIATION_TEMPLATE: /jyt/prod/WHATSAPP_INITIATION_TEMPLATE
  WHATSAPP_INITIATION_TEMPLATE_LANG: /jyt/prod/WHATSAPP_INITIATION_TEMPLATE_LANG
  WHATSAPP_PHONE_NUMBER_ID: /jyt/prod/WHATSAPP_PHONE_NUMBER_ID
  WHATSAPP_WEBHOOK_VERIFY_TOKEN: /jyt/prod/WHATSAPP_WEBHOOK_VERIFY_TOKEN
  X_CLIENT_ID: /jyt/prod/X_CLIENT_ID
  X_CLIENT_SECRET: /jyt/prod/X_CLIENT_SECRET
  X_SCOPE: /jyt/prod/X_SCOPE

logging:
  retention: 14

# Graceful shutdown: Spot interruptions give 2 minutes. Medusa's worker
# process should drain in-flight subscriber callbacks then exit. Stop timeout
# of 120s (default) is enough; bump if we see truncated jobs.
# stop_timeout: 120s

environments:
  prod: {}
