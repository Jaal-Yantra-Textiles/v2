  MEDUSA_BACKEND_URL: /jyt/prod/MEDUSA_BACKEND_URL
  MEDUSA_FF_CACHING: /jyt/prod/MEDUSA_FF_CACHING
  MEDUSA_FF_INDEX_ENGINE: /jyt/prod/MEDUSA_FF_INDEX_ENGINE
  MEDUSA_FF_VIEW_CONFIGURATIONS: /jyt/prod/MEDUSA_FF_VIEW_CONFIGURATIONS
  MISTRAL_API_KEY: /jyt/prod/MISTRAL_API_KEY
  OPENAI_API_KEY: /jyt/prod/OPENAI_API_KEY
  OPENROUTER_API_KEY: /jyt/prod/OPENROUTER_API_KEY
  PARTNER_CORS: /jyt/prod/PARTNER_CORS
  PAYU_MERCHANT_KEY: /jyt/prod/PAYU_MERCHANT_KEY
  PAYU_MERCHANT_SALT: /jyt/prod/PAYU_MERCHANT_SALT
  PAYU_MODE: /jyt/prod/PAYU_MODE
  REDIS_URL: /jyt/prod/REDIS_URL
  RESEND_API_KEY: /jyt/prod/RESEND_API_KEY
