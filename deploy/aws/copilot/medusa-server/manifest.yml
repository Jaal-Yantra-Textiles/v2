# The Medusa API server.
# Public-facing via ALB; auto-scales 1→5 tasks on CPU/memory pressure.
#
# Image is pulled from ECR. The CI workflow mirrors the latest
# ghcr.io/jaal-yantra-textiles/v2 image into ECR before each deploy.

name: medusa-server
type: Load Balanced Web Service

http:
  path: '/'
  alias: v3.jaalyantra.com
  healthcheck:
    path: '/health'
    healthy_threshold: 2
    unhealthy_threshold: 5  # 3 → 5: gives 150s of mid-run slack so a slow
                            # workflow tick doesn't kill an otherwise-healthy task.
    interval: 30s
    timeout: 5s
    grace_period: 240s      # 90s → 240s. Medusa logs "Server is ready" before
                            # finishing module linking + workflow engine resume.
                            # Per Railway behavior, full readiness takes 3-4 min;
                            # 240s grace + 5×30s threshold = 390s kill window.

image:
  # ECR location wins; the CI workflow updates :latest before `svc deploy`.
  # For local-only experiments, swap this for a build block (commented).
  location: 369351873445.dkr.ecr.us-east-1.amazonaws.com/jyt-medusa:latest
  # build:
  #   dockerfile: ../../../apps/backend/Dockerfile
  #   context: ../../../
  port: 9000

cpu: 512        # 0.5 vCPU
memory: 2048    # 2 GB. Bumped on 2026-05-20 along with RDS max_connections
                # bump to 200 (was 79) and switch to fixed count: 1. Even
                # so, rolling deploys still see some concurrent-bootstrap
                # failures; investigation continues (task #18).

# Fixed count: 1. Autoscaling disabled.
# Default ECS rolling deploy with desired=1: 1 new task launches + 1 old
# drains. Total of 2 tasks in flight = manageable connection demand.
# Re-enable autoscaling once the boot-stall is understood/fixed.
count: 1

# Public subnets for Phase 0 (saves $32/mo NAT Gateway).
# Tighten to private+NAT in Phase 1 hardening.
network:
  vpc:
    placement: public

# Non-secret config + role flag.
variables:
  NODE_ENV: production
  MEDUSA_WORKER_MODE: server
  # #707/#712 — base URL for partner-portal product links in WhatsApp confirmation
  # messages. Read by buildPartnerProductUrl (src/workflows/whatsapp/partner-product-url.ts),
  # which falls back to a hardcoded default if unset; this makes the prod value explicit.
  # Non-secret, so it lives here (not under secrets:).
  PARTNER_APP_URL: https://partner.jaalyantra.com
  # #452 — scopes the public feedback artwork picker to a curated art album
  # instead of the general media pool. Read by resolveArtworkSourceId
  # (src/workflows/feedback/lib/artwork-feedback.ts); unset → general "everything
  # in the media randomiser" pool. This album resolves to the 11 curated images
  # on prod. Non-secret (just an album id), so it lives here (not under secrets:).
  FEEDBACK_ARTWORK_ALBUM_ID: 01KS74M4JABCFKHB4WTF90KQYS
  # #859/#861 — sales-channel id of the core storefront ("JYT Medu Store") that
  # approved artisan products are cross-listed onto. There is NO "core store"
  # entity; the channel id IS the identity. Read by resolve-core-sales-channel.ts
  # (the cross-list subscriber runs on the WORKER — set there too). Non-secret.
  # Unset → falls back to the nondeterministic is_default storefront pick.
  CORE_SALES_CHANNEL_ID: sc_01JNQG1YX5549246DFCKKFTE0W
  # #1031 — serve /web/census/* by PROXYING to the standalone edge reader on
  # Render (which holds the Hyperswarm peer and replicates the PUBLIC core by key,
  # read-only/PII-free). Proxy mode keeps the native hypercore stack + swarm OUT
  # of Fargate entirely — Medusa just fetches over HTTPS. The reader was verified
  # to peer the OCI seeder from Render, so Fargate never needs to hole-punch.
  # (Alternative: drop this and set CENSUS_P2P_ENABLED=true to peer in-process —
  #  viable since these tasks run in PUBLIC subnets, but the proxy is simpler.)
  CENSUS_READER_URL: https://handloom-census-reader.onrender.com

# Secrets: rotating values come from Secrets Manager.
# Non-rotating config (CORS, URLs, etc.) comes from SSM Parameter Store — listed
# in the SSM section below; ECS resolves both at task start.
secrets:
  ADMIN_CORS: /jyt/prod/ADMIN_CORS
  ADMIN_OPENAPI_CATALOG_TOKEN: /jyt/prod/ADMIN_OPENAPI_CATALOG_TOKEN
  ADMIN_OPENAPI_CATALOG_URL: /jyt/prod/ADMIN_OPENAPI_CATALOG_URL
  ADMIN_RAG_EMBED_PROVIDER: /jyt/prod/ADMIN_RAG_EMBED_PROVIDER
  ADMIN_RAG_INDEX_VERSION: /jyt/prod/ADMIN_RAG_INDEX_VERSION
  # #559 — feature flag: route the bulk pageview firehose through the in-house
  # Redis ingest buffer (drain-analytics-buffer job persists). Heartbeats stay
  # synchronous so the live-visitor count is real-time. "1" = on; flip the SSM
  # value + redeploy to toggle (ECS resolves secrets at task start).
  ANALYTICS_BATCH_INGEST: /jyt/prod/ANALYTICS_BATCH_INGEST
  # #344 — shared secret for the edge analytics worker's HMAC-signed batch ingest
  # (POST /web/analytics/ingest-batch). MUST equal the worker's ANALYTICS_INGEST_SECRET.
  ANALYTICS_INGEST_SECRET: /jyt/prod/ANALYTICS_INGEST_SECRET
  AUTH_CORS: /jyt/prod/AUTH_CORS
  AUTH_MFA_ENCRYPTION_KEY: /jyt/prod/AUTH_MFA_ENCRYPTION_KEY
  CLOUDFLARE_API_TOKEN: /jyt/prod/CLOUDFLARE_API_TOKEN
  CLOUDFLARE_ZONE_ID: /jyt/prod/CLOUDFLARE_ZONE_ID
  COOKIE_SECRET: /jyt/prod/COOKIE_SECRET
  DATABASE_URL: /jyt/prod/DATABASE_URL
  DELHIVERY_API_TOKEN: /jyt/prod/DELHIVERY_API_TOKEN
  ENCRYPTION_KEY: /jyt/prod/ENCRYPTION_KEY
  ENCRYPTION_KEY_VERSION: /jyt/prod/ENCRYPTION_KEY_VERSION
  # Etsy OAuth (medusa-plugin-etsy-sync). Without these, the connect URL is built
  # with an empty client_id and falls back to the localhost redirect_uri.
  ETSY_KEYSTRING: /jyt/prod/ETSY_KEYSTRING
  ETSY_REDIRECT_URI: /jyt/prod/ETSY_REDIRECT_URI
  ETSY_SHARED_SECRET: /jyt/prod/ETSY_SHARED_SECRET
  ETSY_WEBHOOK_SECRET: /jyt/prod/ETSY_WEBHOOK_SECRET
  # Faire OAuth (medusa-plugin-faire-store-sync). Without these, the connect URL is
  # built with an empty applicationId and falls back to the localhost redirect_uri.
  FAIRE_APP_ID: /jyt/prod/FAIRE_APP_ID
  FAIRE_APP_SECRET: /jyt/prod/FAIRE_APP_SECRET
  FAIRE_REDIRECT_URI: /jyt/prod/FAIRE_REDIRECT_URI
  FACEBOOK_CLIENT_ID: /jyt/prod/FACEBOOK_CLIENT_ID
  FACEBOOK_CLIENT_SECRET: /jyt/prod/FACEBOOK_CLIENT_SECRET
  FACEBOOK_REDIRECT_URI: /jyt/prod/FACEBOOK_REDIRECT_URI
  FACEBOOK_WEBHOOK_VERIFY_TOKEN: /jyt/prod/FACEBOOK_WEBHOOK_VERIFY_TOKEN
  FAL_KEY: /jyt/prod/FAL_KEY
  FRONTEND_URL: /jyt/prod/FRONTEND_URL
  GOOGLE_REDIRECT_URI: /jyt/prod/GOOGLE_REDIRECT_URI
  JWT_SECRET: /jyt/prod/JWT_SECRET
  MAILEROO_API_KEY: /jyt/prod/MAILEROO_API_KEY
  MAILEROO_FROM_DOMAIN: /jyt/prod/MAILEROO_FROM_DOMAIN
  MAILEROO_FROM_EMAIL: /jyt/prod/MAILEROO_FROM_EMAIL
  MAILEROO_FROM_NAME: /jyt/prod/MAILEROO_FROM_NAME
  MAILJET_API_KEY: /jyt/prod/MAILJET_API_KEY
  MAILJET_FROM_EMAIL: /jyt/prod/MAILJET_FROM_EMAIL
  MAILJET_FROM_NAME: /jyt/prod/MAILJET_FROM_NAME
  MAILJET_SECRET_KEY: /jyt/prod/MAILJET_SECRET_KEY
  # #839 — gates POST /webhooks/mailjet/events (Mailjet doesn't sign payloads;
  # the ?token= query param is the only auth). Unset → endpoint runs open.
  MAILJET_WEBHOOK_SECRET: /jyt/prod/MAILJET_WEBHOOK_SECRET
  MASTRA_ENABLE_EMBEDDINGS: /jyt/prod/MASTRA_ENABLE_EMBEDDINGS
  MEDUSA_BACKEND_URL: /jyt/prod/MEDUSA_BACKEND_URL
  MEDUSA_FF_CACHING: /jyt/prod/MEDUSA_FF_CACHING
  MEDUSA_FF_INDEX_ENGINE: /jyt/prod/MEDUSA_FF_INDEX_ENGINE
  MEDUSA_FF_VIEW_CONFIGURATIONS: /jyt/prod/MEDUSA_FF_VIEW_CONFIGURATIONS
  MISTRAL_API_KEY: /jyt/prod/MISTRAL_API_KEY
  OPENAI_API_KEY: /jyt/prod/OPENAI_API_KEY
  OPENROUTER_API_KEY: /jyt/prod/OPENROUTER_API_KEY
  PARTNER_CORS: /jyt/prod/PARTNER_CORS
  # Go-live switch for partner email verification (native Medusa 2.16+ flow).
  # "true" = a partner's login returns verification_required until they confirm
  # their email via /verify-email. Non-secret, but env-specific so it's sourced
  # from SSM (read at boot — a redeploy is required after flipping the value).
  # Also run the `seed-email-templates` Data Plumbing job so the
  # partner-email-verification template exists. See PR #858.
  PARTNER_EMAIL_VERIFICATION: /jyt/prod/PARTNER_EMAIL_VERIFICATION
  # PayU OneAPI (OAuth) — used by the MCP create_payment_link write tool.
  PAYU_CLIENT_ID: /jyt/prod/PAYU_CLIENT_ID
  PAYU_CLIENT_SECRET: /jyt/prod/PAYU_CLIENT_SECRET
  PAYU_MERCHANT_ID: /jyt/prod/PAYU_MERCHANT_ID
  # PayU classic (hash key/salt) — UPI intent + webhook verify_payment.
  PAYU_MERCHANT_KEY: /jyt/prod/PAYU_MERCHANT_KEY
  PAYU_MERCHANT_SALT: /jyt/prod/PAYU_MERCHANT_SALT
  PAYU_MODE: /jyt/prod/PAYU_MODE
  PAYU_ONEAPI_MODE: /jyt/prod/PAYU_ONEAPI_MODE
  REDIS_URL: /jyt/prod/REDIS_URL
  # #576 slice C — recipient for storefront region-request admin emails. Read by
  # api/store/contact-region-request; unset → the route logs + skips (no error).
  REGION_REQUEST_NOTIFY_EMAIL: /jyt/prod/REGION_REQUEST_NOTIFY_EMAIL
  RESEND_API_KEY: /jyt/prod/RESEND_API_KEY
  RESEND_FROM_EMAIL: /jyt/prod/RESEND_FROM_EMAIL
  ROOT_DOMAIN: /jyt/prod/ROOT_DOMAIN
  S3_ACCESS_KEY_ID: /jyt/prod/S3_ACCESS_KEY_ID
  S3_BUCKET: /jyt/prod/S3_BUCKET
  S3_ENDPOINT: /jyt/prod/S3_ENDPOINT
  S3_FILE_URL: /jyt/prod/S3_FILE_URL
  S3_PREFIX: /jyt/prod/S3_PREFIX
  S3_REGION: /jyt/prod/S3_REGION
  S3_SECRET_ACCESS_KEY: /jyt/prod/S3_SECRET_ACCESS_KEY
  SENTRY_DSN: /jyt/prod/SENTRY_DSN
  # #888 — gates POST /webhooks/shipping/track (carrier tracking pushes;
  # Shiprocket has no HMAC, it replays a dashboard-configured header). Unset →
  # endpoint runs open with a warning.
  SHIPPING_WEBHOOK_SECRET: /jyt/prod/SHIPPING_WEBHOOK_SECRET
  # Shiprocket fulfillment provider (#436). The env-gated block in
  # medusa-config.prod.ts registers the provider whenever SHIPROCKET_EMAIL is
  # set — that alone surfaces it in Fulfillment Providers. The actual Shiprocket
  # API calls (label/pickup/track) go through resolveShippingProvider, which
  # reads creds from the `category:shipping` SocialPlatform record, so the
  # password/pickup are intentionally NOT wired as env here.
  SHIPROCKET_EMAIL: /jyt/prod/SHIPROCKET_EMAIL
  STOREFRONT_REVALIDATE_SECRET: /jyt/prod/STOREFRONT_REVALIDATE_SECRET
  STORE_CORS: /jyt/prod/STORE_CORS
  # Enables the Store MCP cart/checkout/PayU *write* tools (POST /mcp + /store/mcp).
  # Off by default in code; "true" here exposes them. See src/api/mcp/README.md.
  STORE_MCP_ENABLE_WRITE: /jyt/prod/STORE_MCP_ENABLE_WRITE
  STRIPE_API_KEY: /jyt/prod/STRIPE_API_KEY
  # Go-live switch for the Stripe Connect *checkout routing* provider (Half B).
  # "false" = the pp_stripe-connect provider is NOT registered (dormant). Flip the
  # SSM value to "true" + redeploy to register it, then add it to the target
  # region's payment providers. Half A onboarding does NOT need this.
  STRIPE_CONNECT_ENABLED: /jyt/prod/STRIPE_CONNECT_ENABLED
  # Signing secret for the Stripe *Connect* webhook (POST /webhooks/stripe/connect),
  # which keeps partner_payment_config Connect status in sync (account.updated).
  # Distinct from STRIPE_WEBHOOK_SECRET (the store/cart payment webhook) — it's the
  # signing secret of the Connect endpoint registered in the Stripe dashboard.
  STRIPE_CONNECT_WEBHOOK_SECRET: /jyt/prod/STRIPE_CONNECT_WEBHOOK_SECRET
  # Public client-side key (pk_…) for the self-hosted Stripe card page
  # (GET /stripe/pay/:cart_id). Non-secret, but env-specific so it's sourced from
  # SSM like the other Stripe params. Without it the hosted page won't render.
  STRIPE_PUBLISHABLE_KEY: /jyt/prod/STRIPE_PUBLISHABLE_KEY
  STRIPE_WEBHOOK_SECRET: /jyt/prod/STRIPE_WEBHOOK_SECRET
  VERCEL_STOREFRONT_REPO: /jyt/prod/VERCEL_STOREFRONT_REPO
  VERCEL_TEAM_ID: /jyt/prod/VERCEL_TEAM_ID
  VERCEL_TOKEN: /jyt/prod/VERCEL_TOKEN
  VISUAL_FLOW_FAILURE_EMAIL: /jyt/prod/VISUAL_FLOW_FAILURE_EMAIL
  WEB_CORS: /jyt/prod/WEB_CORS
  WHATSAPP_ACCESS_TOKEN: /jyt/prod/WHATSAPP_ACCESS_TOKEN
  WHATSAPP_INITIATION_TEMPLATE: /jyt/prod/WHATSAPP_INITIATION_TEMPLATE
  WHATSAPP_INITIATION_TEMPLATE_LANG: /jyt/prod/WHATSAPP_INITIATION_TEMPLATE_LANG
  WHATSAPP_PHONE_NUMBER_ID: /jyt/prod/WHATSAPP_PHONE_NUMBER_ID
  WHATSAPP_WEBHOOK_VERIFY_TOKEN: /jyt/prod/WHATSAPP_WEBHOOK_VERIFY_TOKEN
  X_CLIENT_ID: /jyt/prod/X_CLIENT_ID
  X_CLIENT_SECRET: /jyt/prod/X_CLIENT_SECRET
  X_REDIRECT_URI: /jyt/prod/X_REDIRECT_URI
  X_SCOPE: /jyt/prod/X_SCOPE

# Logging — 14-day retention to keep CW costs down.
logging:
  retention: 14

# Storage: ephemeral. Medusa writes uploads directly to R2; nothing
# important touches local disk.

# Per-environment overrides go here if we ever need them.
environments:
  prod: {}
