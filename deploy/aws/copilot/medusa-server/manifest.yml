# The Medusa API server.
# Public-facing via ALB; auto-scales 1→5 tasks on CPU/memory pressure.
#
# Image is pulled from ECR. The CI workflow mirrors the latest
# ghcr.io/jaal-yantra-textiles/v2 image into ECR before each deploy.

name: medusa-server
type: Load Balanced Web Service

http:
  path: '/'
  alias: v3.jaalyantra.com
  healthcheck:
    path: '/health'
    healthy_threshold: 2
    unhealthy_threshold: 5  # 3 → 5: gives 150s of mid-run slack so a slow
                            # workflow tick doesn't kill an otherwise-healthy task.
    interval: 30s
    timeout: 5s
    grace_period: 240s      # 90s → 240s. Medusa logs "Server is ready" before
                            # finishing module linking + workflow engine resume.
                            # Per Railway behavior, full readiness takes 3-4 min;
                            # 240s grace + 5×30s threshold = 390s kill window.

image:
  # ECR location wins; the CI workflow updates :latest before `svc deploy`.
  # For local-only experiments, swap this for a build block (commented).
  location: 369351873445.dkr.ecr.us-east-1.amazonaws.com/jyt-medusa:latest
  # build:
  #   dockerfile: ../../../apps/backend/Dockerfile
  #   context: ../../../
  port: 9000

cpu: 512        # 0.5 vCPU
memory: 2048    # 2 GB. Bumped on 2026-05-20 along with RDS max_connections
                # bump to 200 (was 79) and switch to fixed count: 1. Even
                # so, rolling deploys still see some concurrent-bootstrap
                # failures; investigation continues (task #18).

# Fixed count: 1. Autoscaling disabled.
# Default ECS rolling deploy with desired=1: 1 new task launches + 1 old
# drains. Total of 2 tasks in flight = manageable connection demand.
# Re-enable autoscaling once the boot-stall is understood/fixed.
count: 1

# Public subnets for Phase 0 (saves $32/mo NAT Gateway).
# Tighten to private+NAT in Phase 1 hardening.
network:
  vpc:
    placement: public

# Non-secret config + role flag.
variables:
  NODE_ENV: production
  MEDUSA_WORKER_MODE: server

# Secrets: rotating values come from Secrets Manager.
# Non-rotating config (CORS, URLs, etc.) comes from SSM Parameter Store — listed
# in the SSM section below; ECS resolves both at task start.
secrets:
  ADMIN_CORS: /jyt/prod/ADMIN_CORS
  ADMIN_OPENAPI_CATALOG_TOKEN: /jyt/prod/ADMIN_OPENAPI_CATALOG_TOKEN
  ADMIN_OPENAPI_CATALOG_URL: /jyt/prod/ADMIN_OPENAPI_CATALOG_URL
  ADMIN_RAG_EMBED_PROVIDER: /jyt/prod/ADMIN_RAG_EMBED_PROVIDER
  ADMIN_RAG_INDEX_VERSION: /jyt/prod/ADMIN_RAG_INDEX_VERSION
  AUTH_CORS: /jyt/prod/AUTH_CORS
  AUTH_MFA_ENCRYPTION_KEY: /jyt/prod/AUTH_MFA_ENCRYPTION_KEY
  CLOUDFLARE_API_TOKEN: /jyt/prod/CLOUDFLARE_API_TOKEN
  CLOUDFLARE_ZONE_ID: /jyt/prod/CLOUDFLARE_ZONE_ID
  COOKIE_SECRET: /jyt/prod/COOKIE_SECRET
  DATABASE_URL: /jyt/prod/DATABASE_URL
  DELHIVERY_API_TOKEN: /jyt/prod/DELHIVERY_API_TOKEN
  ENCRYPTION_KEY: /jyt/prod/ENCRYPTION_KEY
  ENCRYPTION_KEY_VERSION: /jyt/prod/ENCRYPTION_KEY_VERSION
  FACEBOOK_CLIENT_ID: /jyt/prod/FACEBOOK_CLIENT_ID
  FACEBOOK_CLIENT_SECRET: /jyt/prod/FACEBOOK_CLIENT_SECRET
  FACEBOOK_REDIRECT_URI: /jyt/prod/FACEBOOK_REDIRECT_URI
  FACEBOOK_WEBHOOK_VERIFY_TOKEN: /jyt/prod/FACEBOOK_WEBHOOK_VERIFY_TOKEN
  FAL_KEY: /jyt/prod/FAL_KEY
  FRONTEND_URL: /jyt/prod/FRONTEND_URL
  GOOGLE_REDIRECT_URI: /jyt/prod/GOOGLE_REDIRECT_URI
  JWT_SECRET: /jyt/prod/JWT_SECRET
  MAILEROO_API_KEY: /jyt/prod/MAILEROO_API_KEY
  MAILEROO_FROM_DOMAIN: /jyt/prod/MAILEROO_FROM_DOMAIN
  MAILEROO_FROM_EMAIL: /jyt/prod/MAILEROO_FROM_EMAIL
  MAILEROO_FROM_NAME: /jyt/prod/MAILEROO_FROM_NAME
  MAILJET_API_KEY: /jyt/prod/MAILJET_API_KEY
  MAILJET_FROM_EMAIL: /jyt/prod/MAILJET_FROM_EMAIL
  MAILJET_FROM_NAME: /jyt/prod/MAILJET_FROM_NAME
  MAILJET_SECRET_KEY: /jyt/prod/MAILJET_SECRET_KEY
