# The Medusa API server.
# Public-facing via ALB; auto-scales 1→5 tasks on CPU/memory pressure.
#
# Image is pulled from ECR. The CI workflow mirrors the latest
# ghcr.io/jaal-yantra-textiles/v2 image into ECR before each deploy.

name: medusa-server
type: Load Balanced Web Service

http:
  path: '/'
  alias: v3.jaalyantra.com
  healthcheck:
    path: '/health'
    healthy_threshold: 2
    unhealthy_threshold: 3
    interval: 30s
    timeout: 5s
    grace_period: 90s  # Medusa boot + predeploy:force migrations

image:
  # ECR location wins; the CI workflow updates :latest before `svc deploy`.
  # For local-only experiments, swap this for a build block (commented).
  location: 369351873445.dkr.ecr.us-east-1.amazonaws.com/jyt-medusa:latest
  # build:
  #   dockerfile: ../../../apps/backend/Dockerfile
  #   context: ../../../
  port: 9000

cpu: 512        # 0.5 vCPU
memory: 1024    # 1 GB. NOTE: Medusa is resident at ~750 MB so we hug the
                # 75% scale-out threshold and pin to 5 tasks. Bumping to 2048
                # was attempted 2026-05-20 but tripped the circuit breaker —
                # tasks went silent for >90s ~4 min after boot, killed by ALB.
                # Root cause suspected to be the perennial.to workflow stall
                # (see task #18). Re-attempt after that lands.

# Auto-scaling. min 1 to avoid cold-starts; max 5 mirrors Railway's ceiling.
count:
  range:
    min: 1
    max: 5
    # spot_from omitted on purpose — server stays on regular Fargate.
    # Spot interruption (2-min warning) would surface as 5xx responses to users.
  cooldown:
    scale_in_cooldown: 120s
    scale_out_cooldown: 60s
  cpu_percentage: 60
  memory_percentage: 75
  # Optional: requests_per_task if we want request-rate scaling instead of CPU.
  # Tune after observing real traffic.

# Public subnets for Phase 0 (saves $32/mo NAT Gateway).
# Tighten to private+NAT in Phase 1 hardening.
network:
  vpc:
    placement: public

# Non-secret config + role flag.
variables:
  NODE_ENV: production
  MEDUSA_WORKER_MODE: server

# Secrets: rotating values come from Secrets Manager.
# Non-rotating config (CORS, URLs, etc.) comes from SSM Parameter Store — listed
# in the SSM section below; ECS resolves both at task start.
