name: Deploy to Railway

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force_migrate:
        description: "Force DB migrations even if no schema files changed"
        type: boolean
        default: false
      skip_migrate:
        description: "Skip DB migrations entirely (e.g. hotfix deploy)"
        type: boolean
        default: false

# Cancel any in-progress deploy on the same branch when a new push arrives
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Detect what actually changed so downstream jobs can skip work
  # ─────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      deps: ${{ steps.filter.outputs.deps }}
      db:   ${{ steps.filter.outputs.db }}
      src:  ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deps:
              - 'pnpm-lock.yaml'
              - 'package.json'
              - '.npmrc'
            db:
              - 'src/modules/**/migrations/**'
              - 'src/links/**'
              - 'pnpm-lock.yaml'
            src:
              - 'src/**'
              - 'medusa-config.ts'
              - 'medusa-config.prod.ts'
              - 'package.json'

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Build — with two cache layers (node_modules + compiled output)
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: changes
    outputs:
      build_cached: ${{ steps.build_cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      # Layer 1: node_modules — keyed on lockfile hash.
      # Exact hit → pnpm install is completely skipped (~2 min saved).
      - name: Restore node_modules
        id: nm_cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: nm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.nm_cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Use production config
        run: cp medusa-config.prod.ts medusa-config.ts

      # Layer 2: compiled output — keyed on all source + config.
      # Exact hit → medusa build is skipped (~3 min saved).
      - name: Restore build cache
        id: build_cache
        uses: actions/cache@v4
        with:
          path: |
            .medusa/
            workflow-schemas.json
          key: build-${{ runner.os }}-${{ hashFiles('src/**', 'medusa-config.prod.ts', 'package.json') }}

      - name: Build Medusa
        if: steps.build_cache.outputs.cache-hit != 'true'
        run: pnpm medusa build

      - name: Prepare Railway packages
        run: |
          node deploy-railway.js --mode=server --ci
          node deploy-railway.js --mode=worker --ci

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: medusa-build
          path: |
            .medusa/
            package.json
            pnpm-lock.yaml
            .env.railway.*
            medusa-config.ts
            workflow-schemas.json
          retention-days: 1

      - name: Build summary
        run: |
          echo "### Build" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| node_modules cached | ${{ steps.nm_cache.outputs.cache-hit == 'true' && '✅ yes' || '⬇️ installed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| build cached | ${{ steps.build_cache.outputs.cache-hit == 'true' && '✅ yes' || '🔨 compiled' }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # 3. DB Migrations — runs only when migration/link files changed,
  #    or when force_migrate is set via workflow_dispatch.
  #    Skipped entirely when skip_migrate is set.
  #
  #    Requires GitHub secret: DATABASE_URL
  #    (Railway → PostgreSQL service → Connect → Public TCP URL)
  # ─────────────────────────────────────────────────────────────────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: [changes, build]
    # On push:             inputs.* is empty → skip_migrate='', force_migrate=''
    # workflow_dispatch:   inputs.* reflects what the user chose
    #
    # Run when: not skipped AND (db files changed OR force=true)
    if: >-
      inputs.skip_migrate != 'true' &&
      (needs.changes.outputs.db == 'true' || inputs.force_migrate == 'true')
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Restore node_modules
        id: nm_cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (cache miss fallback)
        if: steps.nm_cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: medusa-build

      - name: Use production config
        run: cp medusa-config.prod.ts medusa-config.ts

      - name: Run module migrations (skip link sync — handled separately)
        run: npx medusa db:migrate --skip-links

      - name: Sync links (auto-accept destructive ops like table drops)
        run: npx medusa db:sync-links --execute-all

      - name: Migration summary
        if: always()
        run: |
          echo "### Migrations" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| DB files changed | ${{ needs.changes.outputs.db }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Forced | ${{ inputs.force_migrate }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | ${{ inputs.skip_migrate }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # 4a & 4b. Deploy Server + Worker in parallel.
  #
  # Both wait for migrate to finish (or be skipped) before deploying.
  # Replaces the old sleep 120 / sleep 60 approach.
  # ─────────────────────────────────────────────────────────────────────────
  deploy-server:
    name: Deploy Server
    runs-on: ubuntu-latest
    needs: [build, migrate]
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: medusa-build

      - name: Deploy to Railway
        uses: docker://ghcr.io/railwayapp/cli:latest
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        with:
          args: railway up --service=medusa-server --detach

      - name: Deploy summary
        run: |
          echo "### Server Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | medusa-server |" >> $GITHUB_STEP_SUMMARY
          echo "| Build cached | ${{ needs.build.outputs.build_cached }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Migrations | ${{ needs.migrate.result }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # 5. Health-check the server after Railway has had time to boot.
  #
  #    Railway build + migration + Medusa init typically takes 4-8 min
  #    after the deploy signal. We wait 3 min before the first probe, then
  #    retry every 30 s for up to 15 min total.
  #
  #    Requires GitHub secret: MEDUSA_BACKEND_URL  (e.g. https://api.example.com)
  # ─────────────────────────────────────────────────────────────────────────
  health-check-server:
    name: Health Check — Server
    runs-on: ubuntu-latest
    needs: deploy-server
    if: always() && needs.deploy-server.result == 'success'
    steps:
      - name: Wait for Railway boot (migrations + server init)
        run: |
          echo "Giving Railway 3 min to build and start the container..."
          sleep 180

      - name: Poll /health until ready
        env:
          BACKEND_URL: ${{ secrets.MEDUSA_BACKEND_URL }}
        run: |
          MAX_ATTEMPTS=30
          INTERVAL=30
          ATTEMPT=0
          HEALTH_URL="${BACKEND_URL%/}/health"

          echo "Polling ${HEALTH_URL} (max ${MAX_ATTEMPTS} × ${INTERVAL}s = $((MAX_ATTEMPTS * INTERVAL))s)"

          until [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$HEALTH_URL" || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Server healthy (attempt ${ATTEMPT}, HTTP ${HTTP_CODE})"
              exit 0
            fi

            echo "⏳ Attempt ${ATTEMPT}/${MAX_ATTEMPTS} — HTTP ${HTTP_CODE}. Retrying in ${INTERVAL}s..."
            sleep "$INTERVAL"
          done

          echo "❌ Server did not become healthy after $((MAX_ATTEMPTS * INTERVAL + 180))s"
          exit 1

      - name: Health check summary
        if: always()
        run: |
          echo "### Server Health Check" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | \`${{ secrets.MEDUSA_BACKEND_URL }}/health\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Result | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: [build, migrate]
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: medusa-build

      - name: Deploy to Railway
        uses: docker://ghcr.io/railwayapp/cli:latest
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        with:
          args: railway up --service=medusa-worker --detach

      - name: Deploy summary
        run: |
          echo "### Worker Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | medusa-worker |" >> $GITHUB_STEP_SUMMARY
          echo "| Migrations | ${{ needs.migrate.result }} |" >> $GITHUB_STEP_SUMMARY
