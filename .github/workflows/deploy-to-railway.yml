name: Deploy to Railway

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force_migrate:
        description: "Force DB migrations even if no schema files changed"
        type: boolean
        default: false
      skip_migrate:
        description: "Skip DB migrations entirely (e.g. hotfix deploy)"
        type: boolean
        default: false

# Cancel any in-progress deploy on the same branch when a new push arrives
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Detect what actually changed so downstream jobs can skip work
  # ─────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      db:  ${{ steps.filter.outputs.db }}
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            db:
              - 'src/modules/**/migrations/**'
              - 'src/links/**'
              - 'pnpm-lock.yaml'
            src:
              - 'src/**'
              - 'medusa-config.ts'
              - 'medusa-config.prod.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'Dockerfile'

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Build & push a single image to GHCR.
  #    The same image is used for server, worker, and the migrate job.
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GitHub Actions cache so repeat builds are fast
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          echo "### Image" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | \`${{ steps.meta.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.meta.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # 3. DB Migrations — runs inside the image we just built.
  #    Skipped unless migration/link files changed (or force_migrate=true).
  #
  #    Requires secrets: DATABASE_URL
  # ─────────────────────────────────────────────────────────────────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: [changes, build-and-push]
    if: >-
      inputs.skip_migrate != 'true' &&
      (needs.changes.outputs.db == 'true' || inputs.force_migrate == 'true')
    permissions:
      contents: read
      packages: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NODE_ENV: production
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run module migrations
        run: |
          docker run --rm \
            -e DATABASE_URL \
            -e NODE_ENV \
            -w /app/.medusa/server \
            ${{ needs.build-and-push.outputs.image_ref }} \
            npx medusa db:migrate --skip-links

      - name: Sync links (auto-accept destructive ops like table drops)
        run: |
          docker run --rm \
            -e DATABASE_URL \
            -e NODE_ENV \
            -w /app/.medusa/server \
            ${{ needs.build-and-push.outputs.image_ref }} \
            npx medusa db:sync-links --execute-all-links

      - name: Migration summary
        if: always()
        run: |
          echo "### Migrations" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| DB files changed | ${{ needs.changes.outputs.db }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Forced | ${{ inputs.force_migrate }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | ${{ inputs.skip_migrate }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # 4a & 4b. Deploy Server + Worker in parallel.
  #
  #    Railway services must already be configured with Source = Docker Image
  #    pointing at ghcr.io/<repo>:latest (one-time setup in dashboard). Each
  #    push overwrites :latest and `railway redeploy` triggers a pull+restart.
  # ─────────────────────────────────────────────────────────────────────────
  deploy-server:
    name: Deploy Server
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    if: >-
      always() &&
      needs.build-and-push.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Redeploy medusa-server
        uses: docker://ghcr.io/railwayapp/cli:latest
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        with:
          args: railway redeploy --service=medusa-server --yes

      - name: Deploy summary
        run: |
          echo "### Server Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | medusa-server |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ needs.build-and-push.outputs.image_ref }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Migrations | ${{ needs.migrate.result }} |" >> $GITHUB_STEP_SUMMARY

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    if: >-
      always() &&
      needs.build-and-push.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Redeploy medusa-worker
        uses: docker://ghcr.io/railwayapp/cli:latest
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        with:
          args: railway redeploy --service=medusa-worker --yes

      - name: Deploy summary
        run: |
          echo "### Worker Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | medusa-worker |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ needs.build-and-push.outputs.image_ref }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Migrations | ${{ needs.migrate.result }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # 5. Health-check the server after Railway has had time to pull & boot.
  #
  #    Requires secret: MEDUSA_BACKEND_URL  (e.g. https://api.example.com)
  # ─────────────────────────────────────────────────────────────────────────
  health-check-server:
    name: Health Check — Server
    runs-on: ubuntu-latest
    needs: deploy-server
    if: always() && needs.deploy-server.result == 'success'
    steps:
      - name: Wait for Railway pull + start
        run: |
          echo "Giving Railway 90s to pull the new image and boot..."
          sleep 90

      - name: Poll /health until ready
        env:
          BACKEND_URL: ${{ secrets.MEDUSA_BACKEND_URL }}
        run: |
          MAX_ATTEMPTS=30
          INTERVAL=30
          ATTEMPT=0
          HEALTH_URL="${BACKEND_URL%/}/health"

          echo "Polling ${HEALTH_URL} (max ${MAX_ATTEMPTS} × ${INTERVAL}s = $((MAX_ATTEMPTS * INTERVAL))s)"

          until [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$HEALTH_URL" || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Server healthy (attempt ${ATTEMPT}, HTTP ${HTTP_CODE})"
              exit 0
            fi

            echo "⏳ Attempt ${ATTEMPT}/${MAX_ATTEMPTS} — HTTP ${HTTP_CODE}. Retrying in ${INTERVAL}s..."
            sleep "$INTERVAL"
          done

          echo "❌ Server did not become healthy after $((MAX_ATTEMPTS * INTERVAL + 90))s"
          exit 1

      - name: Health check summary
        if: always()
        run: |
          echo "### Server Health Check" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | \`${{ secrets.MEDUSA_BACKEND_URL }}/health\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Result | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
