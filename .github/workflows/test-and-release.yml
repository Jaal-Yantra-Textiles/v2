name: Test and Release

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/backend/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/test-and-release.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/backend/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/test-and-release.yml'

env:
  # Opt into Node.js 24 for JS-based actions. Node 20 runtime is deprecated
  # on GHA runners; forced default 2026-06-02, removed 2026-09-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        # Pin to 22 (the backend's `engines` floor + prod runtime). Leaving it
        # at '>=20' floats to the newest available (Node 24), which is fine for
        # isolated-vm but non-deterministic across runs.
        node-version: '22'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    # Workspace plugins ship their built output under .medusa/ (their package
    # exports point there). pnpm install only symlinks the package, so the
    # backend can't load the plugin until it's built — without this step every
    # /admin/etsy/* route 404s and the etsySync module won't resolve.
    - name: Build workspace plugins
      run: pnpm --filter "@jytextiles/medusa-plugin-etsy-sync" build

    - name: Check medusa-config dev/prod parity
      run: pnpm --filter @jyt/backend check:prod-config

    - name: Setup Database
      run: |
        psql -h localhost -U postgres -d postgres -c "CREATE USER runner SUPERUSER CREATEDB CREATEROLE;"
        psql -h localhost -U postgres -d postgres -c "GRANT ALL PRIVILEGES ON DATABASE postgres TO runner;"
        psql -h localhost -U postgres -d postgres -c "GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO runner;"

    - name: Create test environment file
      run: |
        cat << EOF > apps/backend/.env.test
        DATABASE_TYPE=postgres
        DATABASE_URL=postgresql://runner@localhost:5432/postgres
        REDIS_URL=redis://localhost:6379
        JWT_SECRET=secret
        COOKIE_SECRET=secret
        ADMIN_CORS=http://localhost:7001
        STORE_CORS=http://localhost:8000
        NODE_ENV=test
        # Test-only AES-256 key for the EncryptionService module. Not real
        # cryptographic material — CI runs against a throwaway DB, no
        # production data is encrypted with it. Generate prod keys via
        # openssl rand -base64 32 and store in your secret manager.
        ENCRYPTION_KEY=bPH59JuZDRQULLeDD62+NiwqwcChpOLN/j7aqu3A+Hw=
        EOF

    # ---- PR: run only the spec files changed in this PR (fast feedback) ----
    - name: Detect changed spec files
      if: github.event_name == 'pull_request'
      id: changed-specs
      uses: tj-actions/changed-files@v45
      with:
        files: |
          apps/backend/**/*.spec.ts

    - name: Run changed specs (PR)
      if: github.event_name == 'pull_request'
      working-directory: apps/backend
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://runner@localhost:5432/postgres
        POSTGRES_USER: runner
        POSTGRES_PASSWORD: runner
      run: |
        ALL="${{ steps.changed-specs.outputs.all_changed_files }}"
        if [ -z "$ALL" ]; then
          echo "::notice::No *.spec.ts files changed in this PR — nothing to run."
          echo "If this PR changes backend source, add/update its spec so CI exercises it."
          exit 0
        fi

        UNIT=""
        HTTP=""
        for f in $ALL; do
          rel="${f#apps/backend/}"          # paths come in repo-root-relative
          case "$rel" in
            *.unit.spec.ts)            UNIT="$UNIT $rel" ;;
            integration-tests/modules/*) echo "::warning::skipping module spec $rel (not wired into targeted PR run)";;
            *.spec.ts)                 HTTP="$HTTP $rel" ;;
          esac
        done

        echo "Changed unit specs:        ${UNIT:-(none)}"
        echo "Changed integration specs: ${HTTP:-(none)}"

        if [ -n "$UNIT" ]; then
          echo "::group::unit specs"
          pnpm test:unit -- --runTestsByPath $UNIT
          echo "::endgroup::"
        fi
        if [ -n "$HTTP" ]; then
          echo "::group::integration (shared DB) specs"
          pnpm test:integration:http:shared -- --runTestsByPath $HTTP
          echo "::endgroup::"
        fi

    # ---- main push: full suite stays the release gate ----
    - name: Run full integration suite (main)
      if: github.event_name == 'push'
      run: pnpm --filter @jyt/backend test:integration:http:batched
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://runner@localhost:5432/postgres
        POSTGRES_USER: runner
        POSTGRES_PASSWORD: runner

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm semantic-release

  notify:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify on success
        if: ${{ needs.test.result == 'success' }}
        run: |
          echo "Tests passed and release completed successfully!"

      - name: Notify on failure
        if: ${{ needs.test.result == 'failure' }}
        run: |
          echo "Tests or release failed!"
